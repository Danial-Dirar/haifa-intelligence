<svg xmlns="http://www.w3.org/2000/svg" width="600" height="170" viewBox="0 0 600 170" fill="none" role="img" aria-label="Haifa Intelligence">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="600" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3aa0ff"/>
      <stop offset="0.5" stop-color="#6c5cff"/>
      <stop offset="1" stop-color="#d24bff"/>
    </linearGradient>
    <linearGradient id="tile" x1="40" y1="37" x2="136" y2="133" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3aa0ff"/>
      <stop offset="0.5" stop-color="#6c5cff"/>
      <stop offset="1" stop-color="#d24bff"/>
    </linearGradient>
  </defs>

  <!-- panel -->
  <rect x="1" y="1" width="598" height="168" rx="24" fill="#0b0b0f" stroke="url(#brand)" stroke-opacity="0.4" stroke-width="2"/>
  <!-- accent top bar -->
  <rect x="24" y="20" width="120" height="4" rx="2" fill="url(#brand)"/>

  <!-- monogram tile -->
  <rect x="40" y="45" width="86" height="86" rx="22" fill="url(#tile)"/>
  <text x="83" y="104" font-family="'Space Grotesk', 'Segoe UI', Inter, system-ui, sans-serif" font-size="44" font-weight="700" fill="#ffffff" text-anchor="middle">Hi</text>

  <!-- wordmark + tagline -->
  <text x="150" y="84" font-family="'Space Grotesk', 'Segoe UI', Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="#ffffff">Haifa <tspan fill="#9aa1ad">Intelligence</tspan></text>
  <text x="151" y="116" font-family="'Segoe UI', Inter, system-ui, sans-serif" font-size="17" font-weight="400" fill="#8b93a1">Intelligence, engineered.</text>
</svg>
